<!DOCTYPE html>
<html>
<head>
    <title>Billboard Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body {
        margin: 0;
        padding: 12px;
        font-size: 16px;
        line-height: 1.4;
        font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        background: #f5f5f5;
    }

    .site-row {
        flex-wrap: wrap;
        background: white;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .site-row b {
        display: inline-block;
        width: 100%;
        word-break: break-word;
        white-space: normal;
        font-size: 16px;
        margin-bottom: 6px;
    }

    .availability-section {
        width: 100%;
    }

    .site-select-section {
        margin-top: 8px;
    }

    input[type="checkbox"],
    input[type="radio"] {
        transform: scale(1.3);
        margin-right: 6px;
    }

    .batch-select {
        transform: scale(1.3);
    }

    input[type="date"] {
        width: 100%;
        margin-top: 6px;
        height: 38px;
        font-size: 16px;
    }

    button {
        height: 50px;
        font-size: 16px;
        width: 100%;
        border-radius: 10px;
        border: none;
        background: black;
        color: white;
        margin-top: 20px;
    }

    /* IMAGE */
    .site-image img {
        width: 100%;
        height: 250px;
        min-height: 250px;
        flex-shrink: 0;
        object-fit: cover;
        border-radius: 10px;
        margin-top: 10px;
    }

    #batch-section {
        background: white;
        border-radius: 10px;
        padding: 12px;
    }

    @media (max-width: 768px) {

        body {
            margin: 12px;
        }

        .site-row {
            flex-direction: column !important;
            align-items: flex-start !important;
        }

        .site-row > div {
            width: 100%;
        }

        .site-row {
            display: flex;
            flex-direction: column !important;
        }

        .site-row div:last-child {
            width: 100%;
            text-align: right;
            margin-top: 10px;
        }

        .site-row b {
            font-size: 17px;
        }
   
        .site-row {
             display: flex;
             flex-direction: column !important;
        }

        .site-row > div:last-child {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
 
        .availability-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .availability-section input[type="date"] {
            flex: 1;
            min-width: 140px;
        }

        .site-select-section {
            margin-top: 6px;
        }

        .batch-select {
            margin-top: 8px;
        }

        .site-row b {
            font-size: 17px;
            font-weight: 600;
        }

        .site-row {
            transition: transform 0.15s ease;
        }

        .site-row:active {
            transform: scale(0.98);
         }
        }
    }
    </style>
</head>

<body>

<form method="POST" action="/generate">

    <h2>Client Name</h2>
    <input type="text" name="client_name" style="width:100%; height:30px;" required>

    <h2>Mode</h2>
    <label><input type="radio" name="mode" value="standard" checked onclick="toggleAvailabilityUI()"> Standard</label><br>
    <label><input type="radio" name="mode" value="rates" onclick="toggleAvailabilityUI()"> Rates</label><br>
    <label><input type="radio" name="mode" value="availability" onclick="toggleAvailabilityUI()"> Availability</label><br>
    <label><input type="radio" name="mode" value="both" onclick="toggleAvailabilityUI()"> Rate + Availability</label><br>

    <div id="batch-section" style="margin-top:20px; padding:10px; border:1px solid #aaa;">
        <b>Batch Availability Date:</b><br><br>
        <input type="date" id="batch_date">
        <button type="button" onclick="applyBatchDate()">Apply Batch</button>
    </div>

    <h2>Sites</h2>

    {% for s in sites %}
    <div class="site-row" style="display:flex; justify-content:space-between; align-items:center; border:1px solid #ccc; padding:10px; margin-bottom:10px;">

        <div>
            <b>{{ s.location }}</b>

            <div class="site-image">
                <img src="/static/previews/{{ s.id | int }}_1.jpg"
     loading="lazy"
     decoding="async"
     onerror="this.style.display='none'">
                     loading="lazy"
                     decoding="async"
                     onerror="this.style.display='none'">
            </div>

            <div class="site-select-section">
                <label>
                    <input type="checkbox" name="site" value="{{ s.id }}">
                    Select
                </label>
            </div>

            <div class="availability-section" style="margin-top:8px;">
                
                <label>
                    <input type="radio" name="availability_{{ s.id }}" value="now">
                    Available Now
                </label>

                <label style="margin-left:15px;">
                    <input type="radio" name="availability_{{ s.id }}" value="date">
                    Select Date
                </label>

                <label style="margin-left:15px;">
                    <input type="radio" name="availability_{{ s.id }}" value="hold">
                    Hold
                </label>

                <input type="date" name="date_{{ s.id }}" style="margin-left:10px;">
            </div>
        </div>

        <div style="text-align:center;">
            <input type="checkbox"
                   class="batch-select"
                   name="batch_site"
                   value="{{ s.id }}"
                   style="width:18px; height:18px;">
            <div style="font-size:12px;">Batch</div>
        </div>

    </div>
    {% endfor %}

    <button type="submit">
        Generate Files
    </button>

</form>

<script>
function applyBatchDate() {

    const batchDate = document.getElementById("batch_date").value;

    if (!batchDate) {
        alert("Select a batch date first.");
        return;
    }

    const batchSelected = document.querySelectorAll(".batch-select:checked");

    if (batchSelected.length === 0) {
        alert("Select batch sites (right side).");
        return;
    }

    batchSelected.forEach(cb => {

        const siteRow = cb.closest(".site-row");
        const siteId = cb.value;

        const dateRadio = siteRow.querySelector(`input[name="availability_${siteId}"][value="date"]`);
        const dateInput = siteRow.querySelector(`input[name="date_${siteId}"]`);

        if (dateRadio) dateRadio.checked = true;
        if (dateInput) dateInput.value = batchDate;

        cb.checked = false;

    });
}

function toggleAvailabilityUI() {

    const mode = document.querySelector('input[name="mode"]:checked').value;

    const show = (mode === "availability" || mode === "both");

    document.getElementById("batch-section").style.display = show ? "block" : "none";

    document.querySelectorAll(".availability-section").forEach(el => {
        el.style.display = show ? "block" : "none";
    });

    document.querySelectorAll(".site-select-section").forEach(el => {
        el.style.display = show ? "none" : "block";
    });
}

window.onload = function() {
    toggleAvailabilityUI();
};
</script>

</body>
</html>
