<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
   <link rel="manifest" href="/static/manifest.json">
   <link rel="apple-touch-icon" href="/static/icon-192.png">
   <meta name="theme-color" content="#000000">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title></title>
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2460.2">
  <style type="text/css">
    body {background-color: #f2f2f2}
    p.p2 {margin: 0.0px 0.0px 0.0px 0.0px; font: 16.0px 'Helvetica Neue'; -webkit-text-stroke: #000000}
    p.p3 {margin: 0.0px 0.0px 0.0px 0.0px; font: 16.0px 'Helvetica Neue'; -webkit-text-stroke: #000000; min-height: 18.0px}
    p.p4 {margin: 0.0px 0.0px 0.0px 0.0px; font: 16.0px 'Helvetica Neue'; color: #ffffff; -webkit-text-stroke: #ffffff; background-color: #000000}
    p.p5 {margin: 0.0px 0.0px 0.0px 0.0px; text-align: center; font: 12.0px 'Helvetica Neue'; -webkit-text-stroke: #000000}
    p.p6 {margin: 0.0px 0.0px 0.0px 0.0px; font: 16.0px 'Helvetica Neue'; color: #ffffff; -webkit-text-stroke: #ffffff}
    span.s1 {font-kerning: none}
    span.s2 {font-kerning: none; background-color: #ffffff}
    span.s3 {font-kerning: none; color: #000000; -webkit-text-stroke: 0px #000000}
    span.s4 {font-kerning: none; background-color: #000000}
  </style>
</head>
<body>
<h2 style="margin: 0.0px 0.0px 19.9px 0.0px; font: 24.0px 'Helvetica Neue'; -webkit-text-stroke: #000000"><span class="s1"><b>Client Name</b></span></h2>
<h2 style="margin: 0.0px 0.0px 19.9px 0.0px; font: 24.0px 'Helvetica Neue'; -webkit-text-stroke: #000000"><span class="s1"><b>Mode</b></span></h2>
<p class="p2"><span class="s1">Standard</span></p>
<p class="p2"><span class="s1">Rates</span></p>
<p class="p2"><span class="s1">Availability</span></p>
<p class="p2"><span class="s1">Rate + Availability</span></p>
<p class="p2"><span class="s2"><b>Batch Availability Date:</b></span></p>
<p class="p3"><span class="s1"></span><br></p>
<p class="p4"><span class="s1">Apply Batch</span></p>
<h2 style="margin: 0.0px 0.0px 19.9px 0.0px; font: 24.0px 'Helvetica Neue'; -webkit-text-stroke: #000000"><span class="s1"><b>Sites</b></span></h2>
<p class="p2"><span class="s1">{% for s in sites %}</span></p>
<p class="p2"><span class="s2"><b>{{ s.location }}</b></span></p>
<p class="p2"><span class="s1"><img src="file:///Attachment.png" alt="Attachment.png"></span></p>
<p class="p2"><span class="s2">Select</span></p>
<p class="p2"><span class="s2">Available Now Select Date Hold</span></p>
<p class="p5"><span class="s2">Batch</span></p>
<p class="p6"><span class="s3">{% endfor %} </span><span class="s4">Generate Files</span></p>
</body>
</html>
