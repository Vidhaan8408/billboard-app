
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billboard Generator</title>

    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Veena Ads">
    <meta name="theme-color" content="#000000">

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: rgba(90, 168, 255, 0.35);
            color: white;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #0b1020 0%, #121a33 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(90,168,255,0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(43,116,255,0.18), transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        h2 {
            margin: 22px 0 12px;
            font-size: 22px;
            color: #fff;
        }

        .page {
            max-width: 1260px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            animation: pageFade 0.8s ease;
        }

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            position: relative;
            overflow: hidden;
            margin-bottom: 34px;
            padding: 34px 30px;
            border-radius: 34px;
            background:
                linear-gradient(145deg,
                    rgba(255,255,255,0.12),
                    rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            animation: heroFloat 6s ease-in-out infinite;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(105,168,255,0.22), transparent 70%);
            top: -260px;
            right: -140px;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .hero-top {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .hero-title {
            font-size: clamp(44px, 6vw, 74px);
            font-weight: 950;
            line-height: 0.95;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff 0%, #69a8ff 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 7s linear infinite;
        }

        .hero-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.4px;
            max-width: 650px;
        }

        .hero-chip {
            padding: 14px 18px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            color: rgba(255,255,255,0.78);
            font-size: 14px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .full-input {
            width: 100%;
            min-height: 52px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: 0.25s ease;
            box-shadow: inset 0 0 0 rgba(255,255,255,0);
        }

        .full-input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .full-input:focus,
        .site-date:focus,
        #batch_date:focus {
            outline: none;
            border-color: rgba(122,184,255,0.55);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 4px rgba(90,168,255,0.12);
        }

        .mode-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .mode-group label {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            padding: 18px;
            border-radius: 22px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(14px);
            transition: all 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .mode-group label:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.14);
            border-color: rgba(122,184,255,0.38);
            box-shadow: 0 18px 36px rgba(0,0,0,0.22);
        }

        .mode-group input[type="radio"] {
            transform: scale(1.15);
            margin-right: 8px;
        }

        .mode-group input[type="radio"] {
            accent-color: #5aa8ff;
        }

        #batch-section {
            display: none;
            margin-top: 20px;
            padding: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        #batch-section .section-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        #batch_date {
            width: 100%;
            min-height: 48px;
            margin-bottom: 12px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: white;
            transition: 0.25s ease;
        }

        .secondary-btn,
        .generate-btn {
            width: 100%;
            min-height: 52px;
            border: 0;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .secondary-btn {
            background: linear-gradient(135deg, #2b74ff 0%, #5aa8ff 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(53, 114, 255, 0.3);
        }

        .generate-btn {
            margin-top: 34px;
            background: linear-gradient(135deg, #ffffff 0%, #d8e7ff 100%);
            color: #0b1020;
            box-shadow: 0 18px 44px rgba(255,255,255,0.22);
            position: sticky;
            bottom: 18px;
            z-index: 20;
            backdrop-filter: blur(12px);
        }

        .secondary-btn:hover,
        .generate-btn:hover {
            transform: translateY(-4px) scale(1.015);
            opacity: 0.99;
        }

        .secondary-btn:active,
        .generate-btn:active {
            transform: scale(0.985);
        }

        .site-row {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 18px;
            padding: 22px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            backdrop-filter: blur(22px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.32);
            transition:
                transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .site-row:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 32px 80px rgba(0,0,0,0.42);
            border-color: rgba(122,184,255,0.26);
        }

        .site-row::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.08), transparent 42%);
            pointer-events: none;
        }

        .site-main {
            flex: 1;
            min-width: 0;
        }

        .site-title {
            font-size: 20px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #fff;
            word-break: break-word;
        }

        .site-image {
            width: 100%;
            margin: 8px 0 12px;
        }

        .site-image img {
            display: block;
            width: 100%;
            height: 320px;
            min-height: 320px;
            object-fit: cover;
            border-radius: 24px;
            background: #111;
            border: 1px solid rgba(255,255,255,0.08);
            transition:
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.35s ease;
            will-change: transform;
        }

        .site-image {
            overflow: hidden;
            border-radius: 18px;
        }

        .site-row:hover .site-image img {
            transform: scale(1.05);
            filter: brightness(1.08) saturate(1.06);
        }

        .site-select-section {
            margin-top: 6px;
        }

        .site-select-section label {
            font-size: 16px;
        }

        .site-select-section input[type="checkbox"] {
            transform: scale(1.15);
            margin-right: 8px;
        }

        .availability-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 14px;
        }

        .availability-section label {
            font-size: 15px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.22s ease;
            backdrop-filter: blur(12px);
        }

        .availability-section label:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(122,184,255,0.26);
            transform: translateY(-2px);
        }

        .availability-section input[type="radio"] {
            transform: scale(1.15);
            margin-right: 6px;
        }

        .availability-section input[type="radio"] {
            accent-color: #5aa8ff;
        }

        .site-date {
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            margin-top: 6px;
        }

        .site-date:disabled {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.4);
        }

        .batch-side {
            width: 76px;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
            flex-shrink: 0;
        }

        .batch-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            font-size: 14px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            transition: 0.2s ease;
        }

        .batch-label:hover {
            transform: scale(1.04);
        }

        .batch-select {
            transform: scale(1.25);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .site-row {
                flex-direction: column;
            }

            .batch-side {
                width: 100%;
                justify-content: flex-start;
                align-items: flex-start;
                padding-top: 6px;
            }

            .batch-label {
                flex-direction: row;
                justify-content: flex-start;
                align-items: center;
                text-align: left;
            }

            .site-image img {
                height: 220px;
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="hero-top">

                <div>
                    <div class="hero-title">VEENA ADS</div>
                    <div class="hero-sub">
                        Intelligent billboard proposal system for premium outdoor advertising.
                    </div>
                </div>

                <div class="hero-chip">
                    Rajkot • Outdoor Media • Proposal Engine
                </div>

            </div>
        </div>
        <form method="POST" action="/generate">
            <h2>Client Name</h2>
            <input type="text" name="client_name" class="full-input" required>

            <h2>Mode</h2>
            <div class="mode-group">
                <label><input type="radio" name="mode" value="standard" checked onclick="toggleAvailabilityUI()"> Standard</label>
                <label><input type="radio" name="mode" value="rates" onclick="toggleAvailabilityUI()"> Rates</label>
                <label><input type="radio" name="mode" value="availability" onclick="toggleAvailabilityUI()"> Availability</label>
                <label><input type="radio" name="mode" value="both" onclick="toggleAvailabilityUI()"> Rate + Availability</label>
            </div>

            <div id="batch-section">
                <div class="section-title">Batch Availability Date:</div>
                <input type="date" id="batch_date" name="batch_date">
                <button type="button" class="secondary-btn" onclick="applyBatchDate()">Apply Batch</button>
            </div>

            <h2>Sites</h2>

            {% for s in sites %}
            <div class="site-row">
                <div class="site-main">
                    <div class="site-title">{{ s.location }}</div>

                    <div class="site-image">
                        <img src="/static/previews/{{ s.id | int }}_1.jpg"
                             loading="lazy"
                             decoding="async"
                             onerror="this.style.display='none'">
                    </div>

                    <div class="site-select-section">
                        <label>
                            <input type="checkbox" name="site" value="{{ s.id }}">
                            Select
                        </label>
                    </div>

                    <div class="availability-section">
                        <label>
                            <input type="radio" class="toggle-radio" name="availability_{{ s.id }}" value="now">
                            Available Now
                        </label>

                        <label>
                            <input type="radio" class="toggle-radio" name="availability_{{ s.id }}" value="date">
                            Select Date
                        </label>

                        <label>
                            <input type="radio" class="toggle-radio" name="availability_{{ s.id }}" value="hold">
                            Hold
                        </label>

                        <input type="date" name="date_{{ s.id }}" class="site-date">
                    </div>
                </div>

                <div class="batch-side">
                    <label class="batch-label">
                        <input type="checkbox" class="batch-select" name="batch_site" value="{{ s.id }}">
                        <span>Batch</span>
                    </label>
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="generate-btn">Generate Files</button>
        </form>
    </div>

    <script>
        function syncAvailabilityRow(siteRow) {
            const dateInput = siteRow.querySelector(".site-date");
            if (!dateInput) return;

            const selectedRadio = siteRow.querySelector('.availability-section input[type="radio"]:checked');

            if (selectedRadio && selectedRadio.value === "date") {
                dateInput.disabled = false;
            } else {
                dateInput.value = "";
                dateInput.disabled = true;
            }
        }

        function toggleAvailabilityUI() {
            const modeInput = document.querySelector('input[name="mode"]:checked');
            const mode = modeInput ? modeInput.value : "standard";
            const show = (mode === "availability" || mode === "both");

            document.getElementById("batch-section").style.display = show ? "block" : "none";

            document.querySelectorAll(".availability-section").forEach(el => {
                el.style.display = show ? "flex" : "none";
            });

            document.querySelectorAll(".site-select-section").forEach(el => {
                el.style.display = show ? "none" : "block";
            });

            document.querySelectorAll(".batch-side").forEach(el => {
                el.style.display = show ? "flex" : "none";
            });

            document.querySelectorAll(".site-row").forEach(siteRow => {
                syncAvailabilityRow(siteRow);
            });
        }

        document.querySelectorAll(".toggle-radio").forEach(radio => {
            radio.dataset.checked = radio.checked ? "true" : "false";

            radio.addEventListener("click", function() {
                const siteRow = this.closest(".site-row");

                if (this.dataset.checked === "true") {
                    this.checked = false;
                    this.dataset.checked = "false";
                } else {
                    document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => {
                        r.dataset.checked = "false";
                    });
                    this.checked = true;
                    this.dataset.checked = "true";
                }

                syncAvailabilityRow(siteRow);
            });
        });

        function applyBatchDate() {
            const batchDate = document.getElementById("batch_date").value;

            if (!batchDate) {
                alert("Select a batch date first.");
                return;
            }

            const batchSelected = document.querySelectorAll(".batch-select:checked");

            if (batchSelected.length === 0) {
                alert("Select batch sites (right side).");
                return;
            }

            batchSelected.forEach(cb => {
                const siteRow = cb.closest(".site-row");
                const siteId = cb.value;

                const dateRadio = siteRow.querySelector(`input[name="availability_${siteId}"][value="date"]`);
                const dateInput = siteRow.querySelector(`input[name="date_${siteId}"]`);

                if (dateRadio) {
                    document.querySelectorAll(`input[name="${dateRadio.name}"]`).forEach(r => {
                        r.dataset.checked = "false";
                    });
                    dateRadio.checked = true;
                    dateRadio.dataset.checked = "true";
                }

                if (dateInput) {
                    dateInput.disabled = false;
                    dateInput.value = batchDate;
                }

                cb.checked = false;
                syncAvailabilityRow(siteRow);
            });
        }

        function resetAndGoHome() {
            const form = document.querySelector("form");
            if (form) form.reset();

            document.querySelectorAll(".toggle-radio").forEach(r => {
                r.dataset.checked = "false";
                r.checked = false;
            });

            document.querySelectorAll(".site-date").forEach(input => {
                input.value = "";
                input.disabled = true;
            });

            document.querySelectorAll(".batch-select").forEach(cb => {
                cb.checked = false;
            });

            toggleAvailabilityUI();
            window.location.href = "/";
        }

        window.addEventListener("load", function() {
            toggleAvailabilityUI();
            document.querySelectorAll(".site-date").forEach(input => {
                input.disabled = true;
            });
            document.querySelectorAll(".site-row").forEach(siteRow => {
                syncAvailabilityRow(siteRow);
            });
        });
    </script>
    <script>
window.addEventListener("load", () => {
    document.body.animate(
        [
            {
                opacity: 0,
                transform: "translateY(10px)"
            },
            {
                opacity: 1,
                transform: "translateY(0px)"
            }
        ],
        {
            duration: 650,
            easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            fill: "forwards"
        }
    );

    const cards = document.querySelectorAll('.site-row');

    cards.forEach((card, index) => {
        card.animate(
            [
                {
                    opacity: 0,
                    transform: 'translateY(40px) scale(0.98)'
                },
                {
                    opacity: 1,
                    transform: 'translateY(0px) scale(1)'
                }
            ],
            {
                duration: 700,
                delay: index * 60,
                easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
                fill: 'forwards'
            }
        );
    });
});
    </script>
</body>
</html>
